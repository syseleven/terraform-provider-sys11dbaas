name: tests

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  acceptance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
      - name: Install dependencies
        run: go mod download
      - env:
          SYS11DBAAS_ORGANIZATION: ${{ secrets.ACCEPTANCETESTSORGANIZATION }}
          SYS11DBAAS_PROJECT: ${{ secrets.ACCEPTANCETESTSPROJECT }}
          SYS11DBAAS_API_KEY: ${{ secrets.ACCEPTANCETESTSAPIKEY }}
        run: |
          TF_ACC=1 go test -parallel 8 -timeout 60m -v ./...
 

